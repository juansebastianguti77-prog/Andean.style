<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Andean Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="menu-navegacion">
        <a href="index.html">Inicio</a>
        <a href="Nosotros.html">Nosotros</a>
        <a href="ropa.html">Ropa</a>
        <a href="contacto.html" class="activo">Contacto</a>
    </nav>

    <main class="contenedor">
        <h1>Contacto 📬</h1>
        <p>¿Tienes alguna duda, sugerencia o quieres hacer un pedido? Escríbenos y te responderemos lo antes posible.</p>
        
        <!-- Redes Sociales -->
        <div class="seccion-redes">
            <h3>Síguenos en nuestras redes:</h3>
            <div class="contenedor-iconos">
                <a href="https://instagram.com/andea_nstyle/" target="_blank" class="icono-red instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://facebook.com/AndeanstyleOficial" target="_blank" class="icono-red facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="mailto:andeanstyle@gmail.com" class="icono-red gmail">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a href="https://www.tiktok.com/@andeanstylevibes?is_from_webapp=1&sender_device=pc" target="_blank" class="icono-red tiktok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
        
        <!-- Formulario de Contacto -->
        <form class="formulario-contacto" action="#" method="POST">
            <div class="grupo-input">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="grupo-input">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>
            </div>

            <div class="grupo-input">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>

            <button type="submit" class="boton-redireccion">Enviar Mensaje ✨</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Andeanstyle - Todos los derechos reservados</p>
    </footer>
</body>
</html>
